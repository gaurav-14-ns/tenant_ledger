<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenant Ledger</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>Tenant Ledger</h1>

<!-- ADD TENANT -->

<section class="card">

<h2>Add Tenant</h2>

<input id="tenantName" placeholder="Tenant Name" oninput="validateTenantForm()">

<input id="groupName" placeholder="Group Name" oninput="validateTenantForm()">

<input id="rent" type="number" placeholder="Monthly Rent" oninput="validateTenantForm()">

<input id="dueDay" type="number" placeholder="Due Day (1-31)" oninput="validateTenantForm()">

<button id="addTenantBtn" onclick="addTenant()" disabled>Add Tenant</button>

</section>

<!-- RECORD TRANSACTION -->

<section class="card">

<h2>Record Transaction</h2>

<input id="date" type="date">

<select id="tenantSelect" onchange="autoFillGroup()"></select>

<input id="groupInput" placeholder="Group">

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option>Rent</option>
<option>Electricity</option>
<option>Other</option>
</select>

<button onclick="addTransaction()">Record</button>

</section>

<!-- DASHBOARD -->

<section class="card dashboard">

<h2>Dashboard</h2>

<div id="expected"></div>
<div id="received"></div>
<div id="pending"></div>
<div id="expenses"></div>

</section>

<!-- TENANT TABLE -->

<section class="card">

<h2>Tenant Status</h2>

<table id="tenantTable"></table>

</section>

<!-- TRANSACTION TABLE -->

<section class="card">

<h2>Transactions</h2>

<table id="transactionTable"></table>

</section>

<script src="script.js"></script>

</body>
</html>
