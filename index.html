<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tenant Ledger</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Tenant Ledger</h1>

<!-- ADD MEMBER -->

<div class="card">

<h2>Add Member</h2>

<input id="memberName" placeholder="Member Name" oninput="validateMemberForm()">

<input id="groupName" placeholder="Group Name" oninput="validateMemberForm()">

<button id="addMemberBtn" onclick="addMember()" disabled>Add Member</button>

</div>


<!-- RECORD TRANSACTION -->

<div class="card">

<h2>Record Transaction</h2>

<input id="date" type="date">

<select id="memberSelect" onchange="autoFillGroup()"></select>

<input id="groupInput" placeholder="Group" readonly>

<input id="amount" type="number" placeholder="Amount">

<select id="type">
<option>Rent</option>
<option>Electricity</option>
<option>Other</option>
</select>

<button id="recordBtn" onclick="addTransaction()">Record</button>

</div>


<!-- DASHBOARD -->

<div class="card">

<h2>Dashboard</h2>

<div class="grid">

<div class="stat">
Expected Rent
<p id="expected"></p>
</div>

<div class="stat">
Rent Received
<p id="received"></p>
</div>

<div class="stat">
Pending Rent
<p id="pending"></p>
</div>

</div>

</div>


<!-- MEMBERS -->

<div class="card">

<h2>Members</h2>

<table id="memberTable"></table>

</div>


<!-- TRANSACTIONS -->

<div class="card">

<h2>Transactions</h2>

<select id="rangeFilter" onchange="render()">
<option value="10">Recent 10</option>
<option value="25">Recent 25</option>
<option value="50">Recent 50</option>
<option value="all">All</option>
</select>

<table id="transactionTable"></table>

</div>


<!-- DATA BACKUP -->

<div class="card">

<button onclick="exportData()">Export Data</button>

<input type="file" id="importFile" onchange="importData()">

</div>


<script src="script.js"></script>

</body>
</html>
